<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" width="240" height="240">
  <!-- Rounded square background -->
  <rect width="240" height="240" rx="44" ry="44" fill="#1C2333"/>

  <!-- Row 1  Blue (unselected) -->
  <circle cx="44" cy="74" r="16" fill="none" stroke="#4A9EE8" stroke-width="5"/>
  <rect x="74" y="60" width="122" height="28" rx="14" fill="#4A9EE8"/>

  <!-- Row 2  Green (unselected) -->
  <circle cx="44" cy="120" r="16" fill="none" stroke="#4CAF7D" stroke-width="5"/>
  <rect x="74" y="106" width="96" height="28" rx="14" fill="#4CAF7D"/>

  <!-- Row 3  Orange / selected (filled ring + dot + shorter bar) -->
  <circle cx="44" cy="166" r="16" fill="#E8683A"/>
  <circle cx="44" cy="166" r="7" fill="#1C2333"/>
  <rect x="74" y="152" width="108" height="28" rx="14" fill="#E8683A"/>
</svg>
