# Questions — one row per question, tagged with quiz_id
[ponypoll_questions]
field.quiz_id    = string
field.sort_order = number
field.text       = string
field.type       = string
field.timeLimit  = number
field.options_json = string
accelerated_fields.by_quiz_order = quiz_id,sort_order

# Named quizzes catalogue
[ponypoll_quizzes]
field.name       = string
field.created_at = string

# App config (active quiz, poll title, answer index)
[ponypoll_config]
field.poll_index    = string
field.poll_subject  = string
field.active_quiz_id = string
