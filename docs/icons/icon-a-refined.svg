<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" width="240" height="240">
  <defs>
    <linearGradient id="sheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="white" stop-opacity="0.22"/>
      <stop offset="55%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="ca"><rect x="20"  y="20"  width="94" height="94" rx="20"/></clipPath>
    <clipPath id="cb"><rect x="126" y="20"  width="94" height="94" rx="20"/></clipPath>
    <clipPath id="cc"><rect x="20"  y="126" width="94" height="94" rx="20"/></clipPath>
    <clipPath id="cd"><rect x="126" y="126" width="94" height="94" rx="20"/></clipPath>
  </defs>

  <!-- background -->
  <rect width="240" height="240" rx="46" fill="#1B1D22"/>

  <!-- Tile A (blue) -->
  <rect x="20"  y="20"  width="94" height="94" rx="20" fill="#1F77B4"/>
  <rect x="20"  y="20"  width="94" height="94" rx="20" fill="url(#sheen)" clip-path="url(#ca)"/>
  <text x="67"  y="82"  font-family="system-ui,'Helvetica Neue',sans-serif" font-size="46" font-weight="700" fill="white" text-anchor="middle">A</text>

  <!-- Tile B (green) -->
  <rect x="126" y="20"  width="94" height="94" rx="20" fill="#65A637"/>
  <rect x="126" y="20"  width="94" height="94" rx="20" fill="url(#sheen)" clip-path="url(#cb)"/>
  <text x="173" y="82"  font-family="system-ui,'Helvetica Neue',sans-serif" font-size="46" font-weight="700" fill="white" text-anchor="middle">B</text>

  <!-- Tile C (orange) -->
  <rect x="20"  y="126" width="94" height="94" rx="20" fill="#ED8B00"/>
  <rect x="20"  y="126" width="94" height="94" rx="20" fill="url(#sheen)" clip-path="url(#cc)"/>
  <text x="67"  y="188" font-family="system-ui,'Helvetica Neue',sans-serif" font-size="46" font-weight="700" fill="white" text-anchor="middle">C</text>

  <!-- Tile D (purple, selected) -->
  <rect x="126" y="126" width="94" height="94" rx="20" fill="#AF6DC7"/>
  <rect x="126" y="126" width="94" height="94" rx="20" fill="url(#sheen)" clip-path="url(#cd)"/>
  <!-- selection ring -->
  <rect x="123" y="123" width="100" height="100" rx="23" fill="none" stroke="white" stroke-width="2" stroke-opacity="0.35"/>
  <!-- checkmark -->
  <polyline points="148,174 163,191 204,156" fill="none" stroke="white" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
