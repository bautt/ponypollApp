<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" width="240" height="240">
  <!-- background -->
  <rect width="240" height="240" rx="46" fill="#1B1D22"/>

  <!-- concentric signal rings -->
  <circle cx="120" cy="124" r="96" fill="none" stroke="#009CDE" stroke-width="6" opacity="0.16"/>
  <circle cx="120" cy="124" r="76" fill="none" stroke="#009CDE" stroke-width="6" opacity="0.26"/>
  <circle cx="120" cy="124" r="56" fill="none" stroke="#009CDE" stroke-width="6" opacity="0.37"/>

  <!-- blue disc -->
  <circle cx="120" cy="124" r="40" fill="#009CDE"/>

  <!-- play triangle -->
